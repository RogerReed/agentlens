name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Attaching a redacted span export (see below) is the fastest way to reproduce most issues.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start a session with …
        2. Ask the agent to …
        3. Open the Files / Timeline / … tab
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent
      options:
        - GitHub Copilot
        - Claude Code
        - Codex CLI
        - Multiple / unsure
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Running as
      options:
        - VS Code extension
        - Standalone server (pnpm run standalone)
        - Docker container
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentLens version
      placeholder: "e.g. 0.1.0  (Help tab → About, or check package.json)"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Span data (recommended)

        Attaching a redacted export lets maintainers replay the exact session that triggered the bug.

        **Export a redacted copy in one step:**

        **VS Code extension:** Open the **Export** tab in the AgentLens dashboard and click **Export Redacted**.
        Alternatively, run **`AgentLens: Export OTEL Data (Redacted)`** from the Command Palette (`Cmd+Shift+P` / `Ctrl+Shift+P`).
        One or more `export_redacted_*.json` files will be written to your workspace root.

        **Standalone server:** Open the **Export** tab in the dashboard at `http://localhost:3000` and click **Export Redacted** to download the file.

        The command automatically replaces the following before writing the files:

        | Data | Replaced with |
        |------|---------------|
        | Prompt text, tool inputs, tool results, LLM messages | `[redacted]` |
        | `user.id`, `user.email`, `user.name`, `user.username` | `[redacted]` |
        | `enduser.*`, `organization.id`, `organization.name` | `[redacted]` |
        | `github.copilot.user`, `github.user` | `[redacted]` |

        Attach the exported file(s) to this issue (drag-and-drop, or rename to `.txt` if GitHub blocks `.json`).

  - type: textarea
    id: spans
    attributes:
      label: Redacted span export
      description: >
        Paste the contents of an export_redacted_*.json file here, or attach the file above.
        If the file is large (> 50 spans), attaching is preferred over pasting.
      placeholder: Paste JSON here or attach the file…
      render: json
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, output channel logs, or anything else that might help.
    validations:
      required: false
